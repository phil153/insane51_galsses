<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Camera Test | v0.9</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 核心包覆層：預設填滿螢幕 */
        #app-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            transition: transform 0.2s ease;
        }

        /* 【關鍵修正】當手機是直向時，強制將容器旋轉 90 度，並重新修正寬高與定位 */
        @media screen and (orientation: portrait) {
            #app-wrapper {
                width: 100vh;
                height: 100vw;
                transform: rotate(90deg);
                transform-origin: top left;
                top: 0;
                left: 100vw; /* 將旋轉後的起點拉回螢幕內 */
            }
        }

        /* 相機畫面區域 */
        .camera-container {
            flex: 1;
            position: relative;
            background-color: #111;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保相機畫面填滿不留白 */
        }

        /* 濾鏡遮罩層 */
        .filter-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            mix-blend-mode: multiply;
            display: none;
        }

        .filter-red { background-color: #ff0000; }
        .filter-cyan { background-color: #00ffff; }

        /* 右側控制面板 */
        .sidebar {
            width: 100px;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 10px;
            height: 100%;
            z-index: 10;
        }

        button {
            width: 75px;
            height: 50px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            background-color: #333;
            color: #fff;
            border-radius: 8px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        button.active {
            background-color: #007bff;
            font-weight: bold;
        }

        #btn-fullscreen {
            background-color: #28a745;
        }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <div class="camera-container">
            <video id="video" autoplay playsinline></video>
            <div id="overlay" class="filter-overlay"></div>
        </div>

        <div class="sidebar">
            <button id="btn-none" class="active">原圖</button>
            <button id="btn-red">紅光</button>
            <button id="btn-cyan">青光</button>
            <button id="btn-fullscreen">全螢幕</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const buttons = {
            none: document.getElementById('btn-none'),
            red: document.getElementById('btn-red'),
            cyan: document.getElementById('btn-cyan')
        };
        const btnFullscreen = document.getElementById('btn-fullscreen');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("相機啟動失敗:", err);
            }
        }

        function setFilter(type) {
            Object.values(buttons).forEach(btn => btn.classList.remove('active'));
            overlay.className = 'filter-overlay';
            
            if (type === 'none') {
                buttons.none.classList.add('active');
                overlay.style.display = 'none';
            } else {
                buttons[type].classList.add('active');
                overlay.classList.add(`filter-${type}`);
                overlay.style.display = 'block';
            }
        }

        buttons.none.addEventListener('click', () => setFilter('none'));
        buttons.red.addEventListener('click', () => setFilter('red'));
        buttons.cyan.addEventListener('click', () => setFilter('cyan'));

        async function toggleFullscreen() {
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                    if (screen.orientation && screen.orientation.lock) {
                        await screen.orientation.lock('landscape');
                    }
                } else {
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock();
                    }
                    await document.exitFullscreen();
                }
            } catch (err) {
                console.warn("全螢幕或方向鎖定暫不支援此裝置:", err);
            }
        }

        btnFullscreen.addEventListener('click', toggleFullscreen);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered', reg))
                    .catch(err => console.log('SW registration failed', err));
            });
        }

        initCamera();
    </script>
</body>
</html>
