<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Camera Test | v0.8 PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 核心包覆層：處理螢幕旋轉 */
        #app-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 當螢幕是直向 (Portrait) 時，利用 CSS 強制將畫面旋轉 90 度模擬橫向 */
        @media screen and (orientation: portrait) {
            #app-wrapper {
                width: 100vh;
                height: 100vw;
                transform: rotate(90deg);
                transform-origin: center;
                position: absolute;
            }
        }

        /* 相機畫面填滿左側/主要區域 */
        .camera-container {
            flex: 1;
            position: relative;
            background-color: #111;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .filter-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            mix-blend-mode: multiply;
            display: none;
        }

        .filter-red { background-color: #ff0000; }
        .filter-cyan { background-color: #00ffff; }

        /* 控制面板固定在右側（適合橫向操作） */
        .sidebar {
            width: 120px;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 10px;
            z-index: 10;
        }

        button {
            width: 80px;
            height: 50px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            background-color: #333;
            color: #fff;
            border-radius: 8px;
            transition: background 0.2s;
        }

        button.active {
            background-color: #007bff;
            font-weight: bold;
        }

        #btn-fullscreen {
            background-color: #28a745;
        }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <div class="camera-container">
            <video id="video" autoplay playsinline></video>
            <div id="overlay" class="filter-overlay"></div>
        </div>

        <div class="sidebar">
            <button id="btn-none" class="active">原圖</button>
            <button id="btn-red">紅光</button>
            <button id="btn-cyan">青光</button>
            <button id="btn-fullscreen">全螢幕</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const buttons = {
            none: document.getElementById('btn-none'),
            red: document.getElementById('btn-red'),
            cyan: document.getElementById('btn-cyan')
        };
        const btnFullscreen = document.getElementById('btn-fullscreen');

        // 初始化相機
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("相機啟動失敗:", err);
            }
        }

        // 濾鏡切換
        function setFilter(type) {
            Object.values(buttons).forEach(btn => btn.classList.remove('active'));
            overlay.className = 'filter-overlay';
            
            if (type === 'none') {
                buttons.none.classList.add('active');
                overlay.style.display = 'none';
            } else {
                buttons[type].classList.add('active');
                overlay.classList.add(`filter-${type}`);
                overlay.style.display = 'block';
            }
        }

        buttons.none.addEventListener('click', () => setFilter('none'));
        buttons.red.addEventListener('click', () => setFilter('red'));
        buttons.cyan.addEventListener('click', () => setFilter('cyan'));

        // 橫向鎖定與全螢幕控制
        async function toggleFullscreen() {
            try {
                if (!document.fullscreenElement) {
                    // 進入全螢幕
                    await document.documentElement.requestFullscreen();
                    // 嘗試鎖定螢幕方向為橫向 (部分行動瀏覽器支援)
                    if (screen.orientation && screen.orientation.lock) {
                        await screen.orientation.lock('landscape');
                    }
                } else {
                    // 退出全螢幕
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock();
                    }
                    await document.exitFullscreen();
                }
            } catch (err) {
                console.warn("全螢幕或方向鎖定暫不支援此裝置/瀏覽器:", err);
            }
        }

        btnFullscreen.addEventListener('click', toggleFullscreen);

        // 註冊 PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker 註冊成功', reg.scope))
                    .catch(err => console.log('Service Worker 註冊失敗', err));
            });
        }

        initCamera();
    </script>
</body>
</html>
